name: CI

on:
  push:
    branches: [main, audit/**]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-build:
    name: Lint + Type-check + Build (campanha-ia)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: campanha-ia
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: campanha-ia/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build (dry, no secrets)
        env:
          # Placeholders só para o build passar. Em prod os reais vêm do .env
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          CLERK_SECRET_KEY: sk_test_placeholder
          NEXT_PUBLIC_APP_URL: https://crialook.com.br
        run: npm run build

  test:
    name: Unit tests (campanha-ia)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: campanha-ia
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: campanha-ia/package-lock.json
      - run: npm ci
      - name: Run vitest with coverage
        run: npm test --if-present -- --run --coverage

  mobile-typecheck-test:
    name: Type-check + Unit tests (crialook-app)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crialook-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: crialook-app/package-lock.json

      # `npm ci` no mobile pode falhar se o lock estiver fora de sync com SDK.
      # Se acontecer, rodar `npm run lock:fix` localmente e commitar.
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run vitest (lib utils) with coverage
        run: npm test -- --coverage

  legal-drift:
    name: Legal content drift (crialook-app vs site)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crialook-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: crialook-app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Phase 7 D-06/D-07: fetches https://crialook.com.br/{privacidade,termos,dpo}
      # and diffs against lib/legal/content.ts. Fail-soft on 5xx (site outage),
      # hard-fail on 4xx (URL renamed) or content drift. See plan 07-03 for the
      # day-zero baseline reconciliation and 07-07 for the script.
      - name: Check legal content drift
        run: npm run check:legal-drift

  deploy-user-lint:
    name: Deploy user lint (production must not run as root)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      # Phase 8 D-13: bash + node-e parser for ecosystem.config.js.
      # Today: WARN on absent user field (file has none); FAIL on user: 'root'.
      # After plan 08-08 owner-action, ecosystem.config.js gets user: 'crialook'
      # explicitly and this job becomes a green OK. A follow-up CI tightening
      # can add --strict to enforce-on-absent.
      - name: Check ecosystem.config.js user field
        run: bash scripts/check-deploy-user.sh
