# ═══════════════════════════════════════
# Nginx reverse proxy para CriaLook
# Colocar em /etc/nginx/sites-available/crialook
# ═══════════════════════════════════════

# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name crialook.com.br www.crialook.com.br;
    return 301 https://$server_name$request_uri;
}

# HTTPS principal
server {
    listen 443 ssl http2;
    server_name crialook.com.br www.crialook.com.br;

    # SSL (Certbot vai gerar esses paths)
    ssl_certificate /etc/letsencrypt/live/crialook.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crialook.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Proxy para o Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Cache de assets estáticos
    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    client_max_body_size 10M;
}
