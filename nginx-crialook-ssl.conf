server {
    listen 80;
    listen [::]:80;
    server_name crialook.com.br www.crialook.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name crialook.com.br www.crialook.com.br;

    ssl_certificate /etc/letsencrypt/live/crialook.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crialook.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Fix 413: permitir uploads de até 25MB (3 fotos de produto)
        client_max_body_size 25M;

        # Timeouts para pipeline AI (até 60s)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
