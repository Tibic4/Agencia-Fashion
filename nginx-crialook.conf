# ═══════════════════════════════════════════════════════════
# CriaLook — Nginx config (canonical)
# Substitui: nginx-crialook-ssl.conf, campanha-ia/deploy/nginx.conf
# ═══════════════════════════════════════════════════════════

# Rate limit zones (em http context idealmente, mas funciona em server scope)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=30r/s;

# Cache zone para HTML público (landing, /sobre, /termos etc)
# 100MB de cache em /var/cache/nginx/crialook, TTL 1h
proxy_cache_path /var/cache/nginx/crialook levels=1:2 keys_zone=html_cache:10m
                 max_size=100m inactive=1h use_temp_path=off;

server {
    listen 80;
    listen [::]:80;
    server_name crialook.com.br www.crialook.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name crialook.com.br www.crialook.com.br;

    ssl_certificate /etc/letsencrypt/live/crialook.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crialook.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    # CSP em report-only primeiro; remover Report-Only quando validado
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.clerk.accounts.dev https://clerk.crialook.com.br https://*.posthog.com https://js.sentry-cdn.com https://sdk.mercadopago.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.clerk.accounts.dev https://clerk.crialook.com.br https://api.mercadopago.com https://*.posthog.com https://*.sentry.io https://api.fashn.ai; img-src 'self' data: blob: https://*.supabase.co https://*.pravatar.cc https://secure.mlstatic.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; frame-src https://*.mercadopago.com https://*.mercadolivre.com https://*.clerk.accounts.dev; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # Brotli (requer libnginx-mod-http-brotli-filter instalado)
    # Instalar: apt install libnginx-mod-http-brotli-filter libnginx-mod-http-brotli-static
    brotli on;
    brotli_static on;
    brotli_comp_level 5;
    brotli_min_length 256;
    brotli_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location ~* \.(jpg|jpeg|png|webp|avif|gif|ico|svg|woff2|woff|ttf|eot)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ── Android App Links / Apple Universal Links ──
    # Servido via public/.well-known/ no Next.js. Forçar Content-Type explícito
    # porque alguns CDNs/proxies tratam .well-known como diretório oculto sem MIME.
    # Cache curto (1h) — quando rotacionarmos a SHA-256 da Play App Signing key,
    # propagar rápido evita app-links quebrados em devices legados.
    location /.well-known/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=3600";
        # Override MIME para JSON (Next.js já manda correto, mas defensivo)
        types { application/json json; }
        default_type application/json;
        access_log off;
    }

    # ── Webhook MP: rate limit mais permissivo, sem buffering ──
    location /api/webhooks/ {
        limit_req zone=webhook_limit burst=60 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # IMPORTANTE: sobrescrever, NÃO acrescentar (previne spoofing via XFF)
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        client_max_body_size 1M;
    }

    # ── SSE endpoint — desabilita buffering para streaming ──
    location /api/campaign/generate {
        limit_req zone=api_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # FIX: sobrescrever X-Forwarded-For para impedir spoofing de IP
        # (era $proxy_add_x_forwarded_for, que acrescenta o header do cliente)
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 25M;
        chunked_transfer_encoding on;
    }

    # ── API geral — rate limit padrão ──
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 25M;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Páginas públicas estáticas (landing, sobre, termos etc) ──
    # Cache HTML por 5min, serve direto do disco em ~1ms.
    # Bypassa cache se request tem Authorization (usuário logado).
    location ~ ^/(sobre|termos|privacidade|subprocessadores|dpo|consentimento-biometrico)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache html_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_bypass $http_authorization $cookie_session;
        proxy_no_cache $http_authorization $cookie_session;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # ── Landing (/) — cache curto pq tem ISR no Next.js também ──
    location = / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache html_cache;
        proxy_cache_valid 200 2m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_bypass $http_authorization $cookie_session;
        proxy_no_cache $http_authorization $cookie_session;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        client_max_body_size 25M;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
