# ═══════════════════════════════════════════════════════════
# CriaLook — Nginx config (canonical)
# Substitui: nginx-crialook-ssl.conf, campanha-ia/deploy/nginx.conf
# ═══════════════════════════════════════════════════════════

# Rate limit zones (em http context idealmente, mas funciona em server scope)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=30r/s;

server {
    listen 80;
    listen [::]:80;
    server_name crialook.com.br www.crialook.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name crialook.com.br www.crialook.com.br;

    ssl_certificate /etc/letsencrypt/live/crialook.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crialook.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    # CSP em report-only primeiro; remover Report-Only quando validado
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.clerk.accounts.dev https://clerk.crialook.com.br https://*.posthog.com https://js.sentry-cdn.com https://sdk.mercadopago.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.clerk.accounts.dev https://clerk.crialook.com.br https://api.mercadopago.com https://*.posthog.com https://*.sentry.io https://api.fashn.ai; img-src 'self' data: blob: https://*.supabase.co https://*.pravatar.cc https://secure.mlstatic.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; frame-src https://*.mercadopago.com https://*.mercadolivre.com https://*.clerk.accounts.dev; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # Brotli (requer libnginx-mod-http-brotli-filter instalado)
    # brotli on;
    # brotli_comp_level 5;
    # brotli_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location ~* \.(jpg|jpeg|png|webp|avif|gif|ico|svg|woff2|woff|ttf|eot)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ── Webhook MP: rate limit mais permissivo, sem buffering ──
    location /api/webhooks/ {
        limit_req zone=webhook_limit burst=60 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # IMPORTANTE: sobrescrever, NÃO acrescentar (previne spoofing via XFF)
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        client_max_body_size 1M;
    }

    # ── SSE endpoint — desabilita buffering para streaming ──
    location /api/campaign/generate {
        limit_req zone=api_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # FIX: sobrescrever X-Forwarded-For para impedir spoofing de IP
        # (era $proxy_add_x_forwarded_for, que acrescenta o header do cliente)
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 25M;
        chunked_transfer_encoding on;
    }

    # ── API geral — rate limit padrão ──
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 25M;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        client_max_body_size 25M;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
